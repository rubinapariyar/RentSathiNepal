<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="table-container">

  <div class="table-header">

    <h2>Recent Bookings</h2>

    <button>Add Booking</button>

  </div>

  <table>

    <thead>

      <tr>
        <th>Booking ID</th>
        <th>Customer</th>
        <th>Rental Item</th>
        <th>Start Date</th>
        <th>Return Date</th>
        <th>Status</th>
        <th>Payment</th>
      </tr>

    </thead>

    <tbody>

      <tr>
        <td>#1001</td>
        <td>Ram Sharma</td>
        <td>Camera</td>
        <td>May 8</td>
        <td>May 12</td>
        <td><span class="active">Active</span></td>
        <td><span class="paid">Paid</span></td>
      </tr>

      <tr>
        <td>#1002</td>
        <td>Sita KC</td>
        <td>Bike</td>
        <td>May 6</td>
        <td>May 10</td>
        <td><span class="pending">Pending</span></td>
        <td><span class="unpaid">Unpaid</span></td>
      </tr>

      <tr>
        <td>#1003</td>
        <td>Hari Thapa</td>
        <td>Laptop</td>
        <td>May 3</td>
        <td>May 5</td>
        <td><span class="returned">Returned</span></td>
        <td><span class="paid">Paid</span></td>
      </tr>

    </tbody>

  </table>

</div>
    
</body>
</html>
